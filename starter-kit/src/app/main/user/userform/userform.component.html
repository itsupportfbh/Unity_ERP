<div class="ufx-wrap">
  <div class="ufx-head">
    <div class="ufx-title">Account Details</div>
    <div class="ufx-subtitle">Fill in the user details to continue to permissions setup.</div>
  </div>

  <form [formGroup]="form" autocomplete="off" class="ufx-form">
    <div class="row g-3">
      <div class="col-md-4">
        <label class="ufx-label">Username</label>
        <input
          class="form-control ufx-input"
          formControlName="username"
          name="new_username"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          inputmode="text"
          placeholder="Enter username" />
      </div>

      <div class="col-md-4">
        <label class="ufx-label">Department</label>
        <ng-select
          class="ufx-select"
          [items]="departments"
          bindLabel="name"
          bindValue="id"
          formControlName="departmentId"
          appendTo="body"
          (change)="emitContext()"
          placeholder="Select Department">
        </ng-select>

        <div
          *ngIf="form.get('departmentId')?.touched && form.get('departmentId')?.invalid"
          class="ufx-error">
          Department is required
        </div>
      </div>

      <div class="col-md-4">
        <label class="ufx-label">Location</label>
        <ng-select
          class="ufx-select"
          [items]="locations"
          bindLabel="name"
          bindValue="id"
          formControlName="locationId"
          appendTo="body"
          placeholder="Select Location">
        </ng-select>

        <div
          *ngIf="form.get('locationId')?.touched && form.get('locationId')?.invalid"
          class="ufx-error">
          Location is required
        </div>
      </div>

      <div class="col-md-4">
        <label class="ufx-label">Email</label>
        <input
          class="form-control ufx-input"
          formControlName="email"
          name="new_email"
          autocomplete="off"
          placeholder="Enter email"
          [class.is-invalid]="form.get('email')?.touched && form.get('email')?.invalid" />
        <div class="invalid-feedback">Enter a valid email address</div>
      </div>

      <div class="col-md-4">
        <label class="ufx-label">Approval Levels</label>
        <ng-select
          class="ufx-select"
          [items]="roles"
          bindLabel="name"
          bindValue="id"
          [multiple]="true"
          [closeOnSelect]="false"
          appendTo="body"
          placeholder="Select roles"
          formControlName="approvalLevelIds"
          (change)="emitContext()">
        </ng-select>
      </div>

      <div class="col-md-4">
        <label class="ufx-label">Password</label>

        <input type="text" name="fake_user" style="display:none" autocomplete="username">
        <input type="password" name="fake_pass" style="display:none" autocomplete="current-password">

        <input
          type="password"
          class="form-control ufx-input"
          formControlName="password"
          name="new_password"
          [attr.autocomplete]="'new-password'"
          [readonly]="isEdit && !canEditPassword"
          placeholder="Enter password"
          [class.is-invalid]="((!isEdit) || (isEdit && canEditPassword)) && form.get('password')?.touched && form.get('password')?.invalid" />

        <small *ngIf="isEdit && !canEditPassword" class="ufx-note">
          Password hidden. Click <b>Edit Password</b> to update.
        </small>

        <div class="invalid-feedback">
          Password must be 8+ chars with uppercase, lowercase, number & special char
        </div>

        <button
          *ngIf="isEdit"
          type="button"
          class="btn btn-sm btn-outline-primary mt-50"
          (click)="togglePasswordEdit()">
          {{ canEditPassword ? 'Cancel Password Edit' : 'Edit Password' }}
        </button>
      </div>
    </div>
  </form>

  <div class="ufx-footer">
    <button type="button" class="ufx-btn ufx-btn-light" (click)="cancel()">
      <span>◀</span> Back
    </button>

    <button type="button" class="ufx-btn ufx-btn-primary" (click)="next()">
      Next <span>▶</span>
    </button>
  </div>
</div>
