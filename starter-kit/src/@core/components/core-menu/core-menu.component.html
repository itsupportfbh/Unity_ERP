<ng-container *ngIf="layout === 'vertical'">
  <ng-container *ngFor="let item of menu">
    <ng-container [ngTemplateOutlet]="nodeTpl" [ngTemplateOutletContext]="{ node: item, level: 0 }"></ng-container>
  </ng-container>

  <ng-template #nodeTpl let-node="node" let-level="level">
    <!-- ITEM -->
    <li
      *ngIf="node.type === 'item'"
      class="nav-item"
      [ngClass]="{ active: node.active || node.isActive, disabled: node.disabled === true }"
    >
      <a class="d-flex align-items-center" [routerLink]="[node.url]" routerLinkActive="active">
        <i class="feather" [ngClass]="'icon-' + (node.icon || 'circle')"></i>
        <span class="menu-title text-truncate">{{ node.title }}</span>
      </a>
    </li>

    <!-- COLLAPSIBLE -->
    <li
      *ngIf="node.type === 'collapsible'"
      class="nav-item has-sub"
      [ngClass]="{ open: node.open || node.isOpen, active: node.active || node.isActive }"
    >
      <!-- parent clickable (toggle only) -->
      <a class="d-flex align-items-center" href="javascript:void(0)" (click)="toggle(node)">
        <i class="feather" [ngClass]="'icon-' + (node.icon || 'circle')"></i>
        <span class="menu-title text-truncate">{{ node.title }}</span>
        <!-- <span class="ms-auto">
          <i class="feather icon-chevron-right"></i>
        </span> -->
      </a>

      <!-- children -->
      <ul class="menu-content" *ngIf="node.children?.length">
        <ng-container *ngFor="let c of node.children">
          <ng-container [ngTemplateOutlet]="nodeTpl" [ngTemplateOutletContext]="{ node: c, level: level + 1 }"></ng-container>
        </ng-container>
      </ul>
    </li>

    <!-- SECTION (if you ever use it) -->
    <li *ngIf="node.type === 'section'" class="navigation-header">
      <span>{{ node.title }}</span>
    </li>
  </ng-template>
</ng-container>

<!-- (optional) Horizontal not used -->
<ng-container *ngIf="layout === 'horizontal'">
  <!-- keep empty or implement later -->
</ng-container>
