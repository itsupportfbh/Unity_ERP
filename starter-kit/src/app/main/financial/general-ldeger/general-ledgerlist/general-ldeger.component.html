<div class="content-wrapper p-0">
  <div class="content-body">
    <section class="users-list-wrapper">
      <div class="card">

        <!-- Header / Controls -->
        <div class="row align-items-center px-1 pt-1">
          <div class="col-md-6 col-12">
            <h4 class="card-text page-title">
              {{ headervalue || 'General Ledger' }}
            </h4>

            <div class="d-flex align-items-center m-1">
              <label class="d-flex align-items-center mb-0">
                Show
                <select class="form-control mx-25 w-auto" [(ngModel)]="selectedOption">
                  <option [ngValue]="10">10</option>
                  <option [ngValue]="25">25</option>
                  <option [ngValue]="50">50</option>
                  <option [ngValue]="100">100</option>
                </select>
                entries
              </label>
            </div>
          </div>

          <div class="col-md-6 col-12 d-flex justify-content-md-end">
            <label class="d-flex align-items-center mb-0">
              Search:
              <input
                [(ngModel)]="searchValue"
                type="search"
                class="form-control ml-25 search-input"
                (keyup)="filterUpdate()"
                (search)="filterUpdate()" />
            </label>
          </div>
        </div>

        <!-- TABLE -->
        <div class="table-wrap px-1 pb-1">
          <ngx-datatable
            #table
            class="bootstrap core-bootstrap coa-table"
            [rows]="displayRows"
            [rowHeight]="48"
            [headerHeight]="50"
            [footerHeight]="50"
            [limit]="selectedOption"
            [columnMode]="'standard'"
            [scrollbarH]="true"
            [scrollbarV]="false"
            [virtualization]="false">

            <!-- HEAD CODE -->
            <ngx-datatable-column name="HEAD CODE" [width]="100">
              <ng-template let-row="row" ngx-datatable-cell-template>
                <span class="cell-text">{{ row.headCode }}</span>
              </ng-template>
            </ngx-datatable-column>

            <!-- HEAD NAME -->
            <ngx-datatable-column name="HEAD NAME" [width]="280">
              <ng-template let-row="row" ngx-datatable-cell-template>
                <div class="head-cell" [class.child]="row.level > 0">
                  <span class="indent" [style.width.px]="row.level * 18"></span>
                  <button
                    *ngIf="row.hasChildren"
                    type="button"
                    class="coa-toggle-btn"
                    (click)="toggleRow(row)">
                    {{ row.$$expanded ? '−' : '+' }}
                  </button>
                  <span class="head-text">{{ row.headName }}</span>
                </div>
              </ng-template>
            </ngx-datatable-column>

            <!-- OPENING BALANCE -->
            <ngx-datatable-column name="OPENING BAL" [width]="140">
              <ng-template let-row="row" ngx-datatable-cell-template>
                <span class="num">{{ row.openingBalance || 0 | number:'1.2-2' }}</span>
              </ng-template>
            </ngx-datatable-column>

            <!-- ✅ DEBIT — single column, header shows baseCurrency -->
            <ngx-datatable-column [name]="'DEBIT (' + baseCurrency + ')'" [width]="150">
              <ng-template let-row="row" ngx-datatable-cell-template>
                <span class="num">
                  {{ row.displayDebit || 0 | number:'1.2-2' }}
                </span>
              </ng-template>
            </ngx-datatable-column>

            <!-- ✅ CREDIT — single column, header shows baseCurrency -->
            <ngx-datatable-column [name]="'CREDIT (' + baseCurrency + ')'" [width]="150">
              <ng-template let-row="row" ngx-datatable-cell-template>
                <span class="num">
                  {{ row.displayCredit || 0 | number:'1.2-2' }}
                </span>
              </ng-template>
            </ngx-datatable-column>

            <!-- ✅ BALANCE — single column, header shows baseCurrency -->
            <ngx-datatable-column [name]="'BALANCE (' + baseCurrency + ')'" [width]="160">
              <ng-template let-row="row" ngx-datatable-cell-template>
                <span class="num" style="font-weight:600;">
                  {{ row.displayBalance || 0 | number:'1.2-2' }}
                </span>
              </ng-template>
            </ngx-datatable-column>

          </ngx-datatable>
        </div>

      </div>
    </section>
  </div>
</div>
