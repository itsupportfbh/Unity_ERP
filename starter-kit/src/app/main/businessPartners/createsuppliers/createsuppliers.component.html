<div *ngIf="isPermissionLoaded; else loadingTemplate">
<div class="content-wrapper container-xxl p-0" *ngIf="canView(); else noAccessTemplate">
  <div class="content-body">
    <div class="card">
      <div class="card-body">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h4 class="card-title mb-0" style="font-weight:700;color:#2E5F73;">Supplier Profile</h4>
          <div class="d-flex gap-1">
            <button type="button" class="btn" style="background-color:#2E5F73;color:#fff;" *ngIf="canShowSaveButton()" (click)="save()">Save</button>
            <button type="button" class="btn btn-outline-secondary" (click)="new()">Reset</button>
            <button type="button" class="btn btn-outline-secondary" (click)="cancel()">Cancel</button>
          </div>
        </div>

        <!-- Row 1 -->
        <div class="row">
          <div class="form-group col-md-3">
            <label class="form-label">Supplier Name *</label>
            <input class="form-control" [(ngModel)]="supplier.name" placeholder="e.g., FreshFoods Pte Ltd" />
          </div>

          <div class="form-group col-md-3">
            <label class="form-label">Country</label>
            <ng-select
              [items]="CountryList"
              bindLabel="countryName"
              bindValue="id"
              [(ngModel)]="supplier.countryId"
              placeholder="Select Country"
              appendTo="body">
            </ng-select>
          </div>

          <div class="form-group col-md-3">
            <label class="form-label">Status</label>
            <ng-select
              [items]="statuses"
              bindLabel="name"
              bindValue="id"
              [(ngModel)]="supplier.statusId"
              placeholder="Select Status"
              appendTo="body">
            </ng-select>
          </div>

          <div class="form-group col-md-3">
            <label class="form-label">Lead Time (days)</label>
            <input type="number" class="form-control" [(ngModel)]="supplier.leadTime" placeholder="7" min="0" />
          </div>
        </div>

        <!-- Row 2 -->
        <div class="row">
          <div class="form-group col-md-3">
            <label class="form-label">Payment Terms</label>
            <ng-select
              [items]="PaymentTermsList"
              bindLabel="paymentTermsName"
              bindValue="id"
              [(ngModel)]="supplier.termsId"
              placeholder="Select Terms"
              appendTo="body">
            </ng-select>
          </div>

          <div class="form-group col-md-3">
            <label class="form-label">Currency</label>
            <ng-select
              [items]="CurrencyList"
              bindLabel="currencyName"
              bindValue="id"
              [(ngModel)]="supplier.currencyId"
              placeholder="Select Currency"
              appendTo="body"
              (change)="onCurrencyChange($event)">
            </ng-select>
            <small *ngIf="exchangeRateLoading" class="text-muted">Fetching rate...</small>
            <small *ngIf="!exchangeRateLoading && exchangeRate !== null" style="color:#1f8a5b;font-weight:600;">
              Exchange Rate: {{ exchangeRate | number:'1.4-4' }}
            </small>
            <small *ngIf="!exchangeRateLoading && exchangeRate === null && supplier.currencyId" class="text-danger">
              No rate found — add in Exchange Rate Master
            </small>
          </div>

          <div class="form-group col-md-3">
            <label class="form-label">Tax Reg No</label>
            <input class="form-control" [(ngModel)]="supplier.taxReg" placeholder="GST/UEN" />
          </div>

          <div class="form-group col-md-3">
            <label class="form-label">Incoterms</label>
            <ng-select
              [items]="incotermsList"
              bindLabel="incotermsName"
              bindValue="id"
              [(ngModel)]="supplier.incotermsId"
              placeholder="Select Incoterm"
              appendTo="body">
            </ng-select>
          </div>
        </div>

        <!-- Row 3 -->
        <div class="row">
          <div class="form-group col-md-3">
            <label class="form-label">Ledger Name / Account</label>
            <ng-select
              [items]="BudgetList"
              bindLabel="headCodeName"
              bindValue="id"
              [(ngModel)]="supplier.budgetLineId"
              placeholder="Search Ledger..."
              appendTo="body">
            </ng-select>
          </div>

          <div class="form-group col-md-3">
            <label class="form-label">Contact Name</label>
            <input class="form-control" [(ngModel)]="supplier.contact" />
          </div>

          <div class="form-group col-md-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="supplier.email" />
          </div>

          <div class="form-group col-md-3">
            <label class="form-label">Phone</label>
            <input class="form-control" [(ngModel)]="supplier.phone" />
          </div>
        </div>

        <!-- Row 4 -->
        <div class="row">
          <div class="form-group col-md-6">
            <label class="form-label">Preferred Items</label>
            <ng-select
              [items]="rows"
              bindLabel="itemName"
              bindValue="id"
              [multiple]="true"
              [closeOnSelect]="true"
              [clearSearchOnAdd]="true"
              [(ngModel)]="preferredItemIds"
              placeholder="Search items..."
              appendTo="body">
            </ng-select>
          </div>

          <div class="form-group col-md-6">
            <label class="form-label">Address</label>
            <textarea class="form-control" rows="3" [(ngModel)]="supplier.address" placeholder="Billing + Shipping address"></textarea>
          </div>
        </div>

        <hr />

        <!-- Bank & Compliance -->
        <h5 class="mb-2" style="font-weight:700;color:#2E5F73;">Bank &amp; Compliance</h5>

        <div class="row">
          <div class="form-group col-md-3">
            <label class="form-label">Bank Name</label>
            <input class="form-control" [(ngModel)]="supplier.bank.name" />
          </div>
          <div class="form-group col-md-3">
            <label class="form-label">Account No</label>
            <input class="form-control" [(ngModel)]="supplier.bank.acc" />
          </div>
          <div class="form-group col-md-3">
            <label class="form-label">SWIFT/IFSC</label>
            <input class="form-control" [(ngModel)]="supplier.bank.swift" />
          </div>
          <div class="form-group col-md-3">
            <label class="form-label">Branch</label>
            <input class="form-control" [(ngModel)]="supplier.bank.branch" />
          </div>
        </div>

        <!-- Compliance Documents -->
        <label class="form-label mt-1">Compliance Documents</label>

        <div *ngFor="let d of docs; let i = index; trackBy: trackByIndex" class="row align-items-end mb-1">
          <div class="form-group col-md-3 mb-0">
            <label class="form-label">Document</label>
            <input class="form-control" [(ngModel)]="d.name" />
          </div>
          <div class="form-group col-md-2 mb-0">
            <label class="form-label">Number</label>
            <input class="form-control" [(ngModel)]="d.number" />
          </div>
          <div class="form-group col-md-2 mb-0">
            <label class="form-label">Expiry</label>
            <input type="date" class="form-control" [(ngModel)]="d.expiry" />
          </div>
          <div class="form-group col-md-3 mb-0">
            <label class="form-label">Upload</label>
            <div class="d-flex align-items-center gap-1">
              <input type="file" [id]="'file_' + i" (change)="onFileSelected($event, i)" style="position:absolute;width:1px;height:1px;overflow:hidden;opacity:0;" multiple />
              <label [attr.for]="'file_' + i" class="sup-file-btn">
                <i class="fas fa-upload mr-25"></i> Choose file
              </label>
              <span class="text-muted" style="font-size:0.78rem;">
                <ng-container *ngIf="d.files?.length; else noFile">{{ d.files.length }} file(s) chosen</ng-container>
                <ng-template #noFile>No file chosen</ng-template>
              </span>
            </div>
          </div>
          <div class="col-md-2 mb-0">
            <button class="btn btn-outline-danger btn-sm" (click)="removeDoc(i)" type="button">Remove</button>
          </div>
        </div>

        <button class="btn btn-sm mt-1" style="background:#2E5F73;color:#fff;" (click)="addDoc()" type="button">
          + Add document
        </button>

      </div>
    </div>
  </div>
</div>
</div>

<ng-template #loadingTemplate>
  <div class="content-wrapper p-0">
    <div class="content-body">
      <div class="alert alert-info mt-2">Loading permission...</div>
    </div>
  </div>
</ng-template>

<ng-template #noAccessTemplate>
  <div class="content-wrapper p-0">
    <div class="content-body">
      <div class="alert alert-warning mt-2">You do not have permission to view this screen.</div>
    </div>
  </div>
</ng-template>
