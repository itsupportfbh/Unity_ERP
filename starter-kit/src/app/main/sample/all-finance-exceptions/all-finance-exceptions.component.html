<div class="card exception-card">
  <div class="card-body">

    <h5 class="card-title">
      All Finance Exceptions
    </h5>

    <div class="table-wrapper">

      <table class="table exception-table mb-0">

        <thead>
          <tr>
            <th>SEVERITY</th>
            <th>TYPE</th>
            <th>DOCUMENT</th>
            <th>PARTY</th>
            <th>IMPACT</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let item of exceptions">

            <td>
              <span
                class="status-badge"
                [ngClass]="{
                  'high-badge': item.level === 'high',
                  'warn-badge': item.level === 'warn'
                }">
                {{ item.severity }}
              </span>
            </td>

            <td>
              {{ item.type }}
            </td>

            <td>
              {{ item.document }}
            </td>

            <td>
              {{ item.party || '-' }}
            </td>

            <td>
              {{ item.impact }}
            </td>

          </tr>

          <tr *ngIf="exceptions.length === 0">
            <td colspan="5" class="text-center text-muted">
              No finance exceptions
            </td>
          </tr>

        </tbody>

      </table>

    </div>

    <div class="action-buttons mt-2">

      <button
        type="button"
        class="btn exception-btn">
        GST Pending
      </button>

      <button
        type="button"
        class="btn exception-btn">
        3-Way Pending
      </button>

      <button
        type="button"
        class="btn exception-btn">
        Negative Stock
      </button>

    </div>

  </div>
</div>
