<!-- src/app/main/purchase/debit-note/debit-note-create/debit-note-create.component.html -->

<button
  type="button"
  class="btn dnBackBtn mb-1"
  (click)="goToDebitNoteList()">
  Go to Debit Note list
</button>

<div class="dnWrap">
  <div class="dnCard">
    <h2 class="dnTitle">Debit Note / Returns</h2>

    <div *ngIf="isGlPosted" class="alert alert-danger mb-2">
      This Debit Note is already GL posted. You cannot edit or post it again.
    </div>

    <div class="dnHdrGrid">

      <div class="dnField dnCol--grn grn-combobox">
        <label class="dnLabel">GRN #</label>

        <div class="dnCombo">
          <input
            type="text"
            class="dnInput dnInput--withCaret"
            [value]="grnSearch"
            (input)="onGrnSearch($event)"
            (focus)="onGrnFocus()"
            placeholder="Search"
            [disabled]="isGstLocked || isGlPosted" />

          <button
            type="button"
            class="dnCaretBtn"
            (click)="grnOpen = !grnOpen"
            aria-label="Toggle GRN list"
            [disabled]="isGstLocked || isGlPosted">
            <i class="fas fa-chevron-down"></i>
          </button>
        </div>

        <div *ngIf="grnOpen && !isGstLocked && !isGlPosted" class="dnDropdown">
          <div class="dnDropHead">Choose GRN</div>

          <button
            type="button"
            class="dnDropItem"
            *ngFor="let g of grnFiltered"
            (click)="toggleGrn(g)">
            <span class="xNo">{{ g.grnNo }}</span>

            <span class="xPo" *ngIf="g.poNo">
              <span class="xSep">•</span> PO: {{ g.poNo }}
            </span>

            <span class="xRight" *ngIf="isGrnSelected(g.id)">
              <i class="fas fa-check"></i>
            </span>
          </button>

          <div *ngIf="!grnFiltered?.length" class="dnDropEmpty">No results</div>
        </div>
      </div>

      <div class="dnField dnCol--sup">
        <label class="dnLabel">Supplier</label>
        <input
          class="dnInput dnInput--readonly"
          [value]="supplierDisplay"
          readonly />
      </div>

      <div class="dnField dnCol--reason">
        <label class="dnLabel">Reason</label>
        <select
          class="dnInput"
          [(ngModel)]="reason"
          [disabled]="isGstLocked || isGlPosted">
          <option value="">Select</option>
          <option value="Short supply">Short supply</option>
          <option value="Price difference">Price difference</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="dnField dnCol--date">
        <label class="dnLabel">Date</label>

        <input
          type="date"
          class="dnInput"
          [(ngModel)]="noteDate"
          (change)="checkGstLock()"
          [disabled]="isGstLocked || isGlPosted" />

        <div *ngIf="isGstLocked" class="alert alert-warning mt-2">
          {{ gstLockMessage || 'GST period is locked. Debit note cannot be changed.' }}
        </div>
      </div>

    </div>

    <div class="dnTableWrap">
      <table class="dnTable">
        <thead>
          <tr>
            <th>Item</th>
            <th>Variance Qty</th>
            <th>Price</th>
            <th>Remarks</th>
            <th class="tRight"></th>
          </tr>
        </thead>

        <tbody>
          <tr *ngIf="retRows.length === 0">
            <td colspan="5" class="dnEmpty">No lines yet.</td>
          </tr>

          <tr *ngFor="let r of retRows; let i = index; trackBy: trackByIndex">
            <td>
              <input
                class="dnCellInput"
                [(ngModel)]="retRows[i].item"
                [name]="'item_' + i"
                [disabled]="isGstLocked || isGlPosted" />
            </td>

            <td>
              <input
                type="number"
                class="dnCellInput"
                [(ngModel)]="retRows[i].qty"
                [name]="'qty_' + i"
                [disabled]="isGstLocked || isGlPosted" />
            </td>

            <td>
              <input
                type="number"
                class="dnCellInput"
                [(ngModel)]="retRows[i].price"
                [name]="'price_' + i"
                [disabled]="isGstLocked || isGlPosted" />
            </td>

            <td>
              <input
                class="dnCellInput"
                [(ngModel)]="retRows[i].remarks"
                [name]="'remarks_' + i"
                [disabled]="isGstLocked || isGlPosted" />
            </td>

            <td class="tRight">
              <button
                type="button"
                class="dnRemoveBtn"
                (click)="retRemoveRow(i)"
                [disabled]="isGstLocked || isGlPosted">
                Remove
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="dnTableFoot">
        <button
          type="button"
          class="dnAddBtn"
          (click)="retAddRow()"
          [disabled]="isGstLocked || isGlPosted">
          + Add line
        </button>

        <div class="dnTotal">
          Total: {{ totalAmount | number:'1.2-2' }}
        </div>
      </div>
    </div>

    <div class="dnActions">
      <button
        class="btn btn-outline-secondary"
        type="button"
        (click)="goToDebitNoteList()">
        Cancel
      </button>

      <button
        class="btn btn-primary"
        type="button"
        (click)="save(true)"
        [disabled]="isGstLocked || isGlPosted">
        Post Debit Note
      </button>
    </div>

  </div>
</div>
