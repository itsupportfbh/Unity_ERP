<div class="inventory-summary-card">

  <div class="section-title">
    Quick Stats
  </div>

  <div class="row">

    <div class="col-md-6 mb-1">
      <div class="summary-box">
        <div class="summary-title">
          RECEIPTS TODAY
        </div>

        <div class="summary-value">
          {{ receiptsToday }}
        </div>

        <div class="summary-subtitle">
          GRN entries
        </div>
      </div>
    </div>

    <div class="col-md-6 mb-1">
      <div class="summary-box">
        <div class="summary-title">
          ISSUES TODAY
        </div>

        <div class="summary-value">
          {{ issuesToday }}
        </div>

        <div class="summary-subtitle">
          Stock issues
        </div>
      </div>
    </div>

    <div class="col-md-6 mb-1">
      <div class="summary-box">
        <div class="summary-title">
          TRANSFERS
        </div>

        <div class="summary-value">
          {{ transfers }}
        </div>

        <div class="summary-subtitle">
          WH to WH
        </div>
      </div>
    </div>

    <div class="col-md-6 mb-1">
      <div class="summary-box">
        <div class="summary-title">
          ADJUSTMENTS
        </div>

        <div class="summary-value">
          {{ adjustments }}
        </div>

        <div class="summary-subtitle">
          Manual adj.
        </div>
      </div>
    </div>

  </div>

</div>
