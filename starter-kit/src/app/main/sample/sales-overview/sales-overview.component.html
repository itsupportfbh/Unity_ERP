<div class="card sales-overview-card">
  <div class="card-body">

    <div class="d-flex justify-content-between align-items-center mb-2">
      <div>
        <h5 class="mb-0">Sales Overview</h5>
        <small class="text-muted">
          Orders • Deliveries • Invoices  • Quotations 
        </small>
      </div>
    </div>

    <apx-chart
      *ngIf="apexBarChart"
      [series]="apexBarChart.series"
      [chart]="apexBarChart.chart"
      [plotOptions]="apexBarChart.plotOptions"
      [dataLabels]="apexBarChart.dataLabels"
      [xaxis]="apexBarChart.xaxis"
      [colors]="apexBarChart.colors"
      [grid]="apexBarChart.grid">
    </apx-chart>

  </div>
</div>
