<div class="row">

  <!-- Total Recipes -->
  <div class="col-lg col-md-6 col-sm-6 mb-2">
    <div class="kpi-card blue-card">
      <div class="card-content">
        <div class="card-title">Total recipes</div>

        <div class="card-value">
          {{ totalRecipes }}
        </div>

        <div class="card-footer success-text">
          12 added this month
        </div>
      </div>
    </div>
  </div>

  <!-- Production Orders -->
  <div class="col-lg col-md-6 col-sm-6 mb-2">
    <div class="kpi-card green-card">
      <div class="card-content">
        <div class="card-title">Production orders</div>

        <div class="card-value">
          {{ productionOrders }}
        </div>

        <div class="card-footer success-text">
          +8 vs last week
        </div>
      </div>
    </div>
  </div>

  <!-- Avg Recipe Cost -->
  <div class="col-lg col-md-6 col-sm-6 mb-2">
    <div class="kpi-card orange-card">
      <div class="card-content">
        <div class="card-title">Avg recipe cost</div>

        <div class="card-value">
          {{ avgRecipeCost }}
        </div>

        <div class="card-footer danger-text">
          −₹12 vs last month
        </div>
      </div>
    </div>
  </div>

  <!-- Raw Materials -->
  <div class="col-lg col-md-6 col-sm-6 mb-2">
    <div class="kpi-card purple-card">
      <div class="card-content">
        <div class="card-title">Raw materials</div>

        <div class="card-value">
          {{ rawMaterials }}
        </div>

        <div class="card-footer normal-text">
          Across 6 warehouses
        </div>
      </div>
    </div>
  </div>

  <!-- Pending Orders -->
  <div class="col-lg col-md-6 col-sm-6 mb-2">
    <div class="kpi-card red-card">
      <div class="card-content">
        <div class="card-title">Pending orders</div>

        <div class="card-value">
          {{ pendingOrders }}
        </div>

        <div class="card-footer danger-text">
          3 overdue
        </div>
      </div>
    </div>
  </div>

</div>
