<div class="card ar-aging-card">
  <div class="card-body">

    <h5 class="mb-0 font-weight-bold">
      AR Aging
    </h5>

    <small class="text-muted">
      Customer receivables
    </small>

    <div class="table-responsive mt-2">
      <table class="table table-bordered mb-0">

        <thead>
          <tr>
            <th>RECEIVABLES AGING</th>
            <th class="text-right"></th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let item of agingData">
            <td>{{ item.period }}</td>

            <td
              class="text-right"
              [class.overdue]="item.overdue"
              [class.amount]="!item.overdue">
              {{ item.amount }}
            </td>
          </tr>

          <tr *ngIf="agingData.length === 0">
            <td colspan="2" class="text-center">
              No AR aging data
            </td>
          </tr>
        </tbody>

      </table>
    </div>

    <div class="mt-2">
      <button class="btn btn-outline-primary btn-sm">
        Open AR Invoices
      </button>
    </div>

  </div>
</div>
