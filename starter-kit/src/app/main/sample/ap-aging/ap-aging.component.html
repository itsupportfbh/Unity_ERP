<div class="card ap-aging-card">
  <div class="card-body">

    <h5 class="mb-0 font-weight-bold">
      AP Aging
    </h5>

    <small class="text-muted">
      Vendor receivables
    </small>

    <div class="table-responsive mt-2">
      <table class="table table-bordered mb-0">
        <thead>
          <tr>
            <th>RECEIVABLES AGING</th>
            <th class="text-right"></th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let item of agingData">
            <td>{{ item.period }}</td>

            <td
              class="text-right"
              [ngClass]="item.overdue ? 'overdue' : 'amount'">
              {{ item.amount }}
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
