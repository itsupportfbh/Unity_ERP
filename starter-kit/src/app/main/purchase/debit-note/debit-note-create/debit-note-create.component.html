<!-- src/app/main/purchase/debit-note/debit-note-create/debit-note-create.component.html -->

<button
  type="button"
  class="btn dnBackBtn mb-1"
  (click)="goToDebitNoteList()">
  Go to Debit Note list
</button>

<div class="dnWrap">
  <div class="dnCard">
    <h2 class="dnTitle">Debit Note / Returns</h2>

    <!-- HEADER ROW (same row like screenshot) -->
    <div class="dnHdrGrid">

      <!-- GRN # (wide combobox) -->
      <div class="dnField dnCol--grn grn-combobox">
        <label class="dnLabel">GRN #</label>

        <div class="dnCombo">
          <input
            type="text"
            class="dnInput dnInput--withCaret"
            [value]="grnSearch"
            (input)="onGrnSearch($event)"
            (focus)="onGrnFocus()"
            placeholder="Search"
            [attr.aria-expanded]="grnOpen"
          />

          <button
            type="button"
            class="dnCaretBtn"
            (click)="grnOpen = !grnOpen"
            aria-label="Toggle GRN list">
            <i class="fas fa-chevron-down"></i>
          </button>
        </div>

        <!-- Dropdown -->
        <div *ngIf="grnOpen" class="dnDropdown">
          <div class="dnDropHead">Choose GRN</div>

          <button
            type="button"
            class="dnDropItem"
            *ngFor="let g of grnFiltered"
            (click)="toggleGrn(g)">
            <span class="xNo">{{ g.grnNo }}</span>

            <span class="xPo" *ngIf="g.poNo">
              <span class="xSep">•</span> PO: {{ g.poNo }}
            </span>

            <span class="xRight" *ngIf="isGrnSelected(g.id)">
              <i class="fas fa-check"></i>
            </span>
          </button>

          <div *ngIf="!grnFiltered?.length" class="dnDropEmpty">No results</div>
        </div>
      </div>

      <!-- Supplier -->
      <div class="dnField dnCol--sup">
        <label class="dnLabel">Supplier</label>
        <input
          class="dnInput dnInput--readonly"
          [value]="supplierDisplay"
          readonly
        />
      </div>

      <!-- Reason -->
      <div class="dnField dnCol--reason">
        <label class="dnLabel">Reason</label>
        <select class="dnInput" [(ngModel)]="reason">
          <option value="">Select</option>
          <option value="Short supply">Short supply</option>
          <option value="Price difference">Price difference</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <!-- Date -->
      <div class="dnField dnCol--date">
        <label class="dnLabel">Date</label>
        <input type="date" class="dnInput" [(ngModel)]="noteDate" />
      </div>

    </div>

    <!-- Lines table (kept your table) -->
    <div class="dnTableWrap">
      <table class="dnTable">
        <thead>
          <tr>
            <th>Item</th>
            <th>Variance Qty</th>
            <th>Price</th>
            <th>Remarks</th>
            <th class="tRight"></th>
          </tr>
        </thead>

        <tbody>
          <tr *ngIf="retRows.length === 0">
            <td colspan="5" class="dnEmpty">No lines yet.</td>
          </tr>

          <tr *ngFor="let r of retRows; let i = index; trackBy: trackByIndex">
            <td>
              <input class="dnCellInput" [(ngModel)]="retRows[i].item" [name]="'item_' + i" />
            </td>

            <td>
              <input type="number" class="dnCellInput" [(ngModel)]="retRows[i].qty" [name]="'qty_' + i" />
            </td>

            <td>
              <input type="number" class="dnCellInput" [(ngModel)]="retRows[i].price" [name]="'price_' + i" />
            </td>

            <td>
              <input class="dnCellInput" [(ngModel)]="retRows[i].remarks" [name]="'remarks_' + i" />
            </td>

            <td class="tRight">
              <button type="button" class="dnRemoveBtn" (click)="retRemoveRow(i)">
                Remove
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="dnTableFoot">
        <button type="button" class="dnAddBtn" (click)="retAddRow()">+ Add line</button>
        <div class="dnTotal">Total: {{ totalAmount | number:'1.2-2' }}</div>
      </div>
    </div>

    <!-- Footer buttons -->
    <div class="dnActions">
      <button class="btn btn-outline-secondary" type="button" (click)="goToDebitNoteList()">Cancel</button>
      <button class="btn btn-primary" type="button" (click)="save(true)">Post Debit Note</button>
    </div>

  </div>
</div>
